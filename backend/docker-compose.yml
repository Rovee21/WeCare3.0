version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: wecare
      POSTGRES_USER: wecare
      POSTGRES_PASSWORD: wecare_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=wecare.settings.local
      - DATABASE_URL=postgres://wecare:wecare_local@db:5432/wecare
      - SECRET_KEY=local-dev-secret-key-change-in-production
      - DEBUG=True
    depends_on:
      - db

volumes:
  postgres_data:
